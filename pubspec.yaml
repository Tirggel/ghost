name: ghost
description: >
  Ghost — Personal AI Assistant.
  Secure, modular, testable.
version: 0.1.0
publish_to: none

environment:
  sdk: '^3.8.0'

dependencies:
  # UI & Flutter
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.2.1
  flutter_markdown_plus: ^1.0.7
  emoji_picker_flutter: ^4.4.0
  file_picker: ^10.3.10
  file_selector: ^1.1.0
  flutter_timezone: ^5.0.1
  google_fonts: ^8.0.2
  url_launcher: ^6.3.1
  intl: ^0.20.2
  shared_preferences: ^2.5.4
  easy_localization: ^3.0.7
  easy_logger: ^0.0.2
  path_provider: ^2.1.5
  flutter_code_editor: ^0.3.5
  highlight: ^0.7.0
  flutter_highlight: ^0.7.0
  sherpa_onnx: ^1.12.36
  record: ^6.2.0
  flutter_secure_storage: ^10.0.0
  objectbox_flutter_libs: ^5.3.1

  # Logic & Backend
  archive: ^3.6.1
  args: ^2.5.0
  cron: ^0.6.2
  crypto: ^3.0.6
  ddgs: ^0.3.2
  google_generative_ai: ^0.4.7
  googleapis: ^16.0.0
  googleapis_auth: ^2.0.0
  hive_ce: ^2.19.3
  http: ^1.6.0
  json_annotation: ^4.9.0
  logging: ^1.3.0
  nyxx: ^6.8.1
  path: ^1.9.1
  pointycastle: ^4.0.0
  objectbox: ^5.3.1
  puppeteer: ^3.16.0
  shelf: ^1.4.2
  shelf_router: ^1.1.4
  shelf_web_socket: ^2.0.1
  teledart: ^0.6.1
  uuid: ^4.5.3
  watcher: ^1.1.1
  web_socket_channel: ^3.0.3
  markdown: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: any
  json_serializable: any
  objectbox_generator: any
  lints: any
  mockito: any
  build_test: any
  test: any

flutter:
  uses-material-design: true
  assets:
    - assets/translations/
    - assets/icons/llm/
    - assets/icons/logo/
    - assets/icons/channels/
