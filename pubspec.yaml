name: ghost
description: >
  Ghost — Personal AI Assistant. A complete Dart clone of OpenClaw.
  Secure, modular, testable.
version: 0.1.0
publish_to: none

environment:
  sdk: ^3.0.0

dependencies:
  archive: ^3.6.1
  args: ^2.5.0
  cron: ^0.6.2
  crypto: ^3.0.6
  ddgs: ^0.3.2
  google_generative_ai: ^0.4.7
  googleapis: ^16.0.0
  googleapis_auth: ^2.0.0
  hive_ce: ^2.19.3
  http: ^1.6.0
  json_annotation: ^4.9.0
  logging: ^1.3.0
  nyxx: ^6.8.1
  path: ^1.9.1
  pointycastle: ^4.0.0
  objectbox: ^4.3.0
  puppeteer: ^3.16.0
  shelf: ^1.4.2
  shelf_router: ^1.1.4
  shelf_web_socket: ^2.0.1
  teledart: ^0.6.1
  uuid: ^4.5.3
  watcher: ^1.1.1
  web_socket_channel: ^3.0.2

dev_dependencies:
  build_runner: ^2.4.14
  json_serializable: ^6.9.4
  objectbox_generator: any
  lints: ^5.1.1
  mockito: ^5.4.6
  build_test: ^2.2.2
  test: ^1.25.15
